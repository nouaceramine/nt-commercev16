name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/nt-commerce
            git pull origin main
            cd /var/www/nt-commerce/backend
            venv/bin/pip install -r requirements.txt --quiet
            cd /var/www/nt-commerce/frontend
            npm install --legacy-peer-deps --registry https://registry.npmjs.org --quiet
            DISABLE_ESLINT_PLUGIN=true CI=false npm run build
            sudo systemctl restart nt-backend
            sudo systemctl reload nginx
            echo "✅ Deployed successfully"
