name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/nt-commerce
            git pull origin main
            cd backend && pip3 install -r requirements.txt --quiet
            cd /var/www/nt-commerce/frontend && yarn install --silent && yarn build
            sudo systemctl restart nt-backend
            sudo systemctl reload nginx
            echo "✅ Deployed successfully"
